{{- if .Values.api.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.port }}
        env:
        {{- range $key, $value := .Values.api.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: DB_HOST
          value: "postgres.{{ .Values.namespace }}.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.api.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.api.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.api.serviceType | default "ClusterIP" }}
  ports:
  - port: {{ .Values.api.port }}
    targetPort: {{ .Values.api.port }}
    {{- if and (eq (.Values.api.serviceType | default "ClusterIP") "NodePort") .Values.api.nodePort }}
    nodePort: {{ .Values.api.nodePort }}
    {{- end }}
  selector:
    app: platform-api
{{- end }}

{{- if .Values.orchestrator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-orchestrator
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.orchestrator.replicas }}
  selector:
    matchLabels:
      app: platform-orchestrator
  template:
    metadata:
      labels:
        app: platform-orchestrator
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      containers:
      - name: orchestrator
        image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
        imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
        env:
        {{- range $key, $value := .Values.orchestrator.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: DB_HOST
          value: "postgres.{{ .Values.namespace }}.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        - name: PLATFORM_NAMESPACE
          value: {{ .Values.namespace | quote }}
        resources:
          {{- toYaml .Values.orchestrator.resources | nindent 10 }}
{{- end }}

{{- if .Values.dashboard.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-dashboard
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: platform-dashboard
  template:
    metadata:
      labels:
        app: platform-dashboard
    spec:
      initContainers:
      - name: clone-and-build-frontend
        image: node:20-alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            apk add --no-cache git
            git clone --depth 1 https://github.com/shruti23-ui/Urumi.ai.git /tmp/repo
            cp -r /tmp/repo/frontend/. /app/
            cd /app
            npm install
            npm run build
            echo "Build complete"
        env:
        {{- range $key, $value := .Values.dashboard.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        - name: frontend-code
          mountPath: /app
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      containers:
      - name: dashboard
        image: node:20-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.dashboard.port }}
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args:
          - |
            npm install -g serve
            serve -s dist -l {{ .Values.dashboard.port }}
        volumeMounts:
        - name: frontend-code
          mountPath: /app
        resources:
          {{- toYaml .Values.dashboard.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.dashboard.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.dashboard.port }}
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: frontend-code
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: platform-dashboard
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.dashboard.serviceType | default "ClusterIP" }}
  ports:
  - port: {{ .Values.dashboard.port }}
    targetPort: {{ .Values.dashboard.port }}
    {{- if and (eq (.Values.dashboard.serviceType | default "ClusterIP") "NodePort") .Values.dashboard.nodePort }}
    nodePort: {{ .Values.dashboard.nodePort }}
    {{- end }}
  selector:
    app: platform-dashboard
{{- end }}
